<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 190" role="img" aria-labelledby="title desc">
  <title id="title">Electricity generation from speed breaker by air compression</title>
  <desc id="desc">Graphical schematic of a vehicle compressing air through a speed breaker to drive a Wells turbine and generate electricity.</desc>
  <rect width="320" height="190" fill="#fbfcff"/>
  <g font-family="Arial, Helvetica, sans-serif" fill="#12233b">
    <text x="16" y="25" font-size="16" font-weight="700">Speed breaker energy</text>
    <text x="16" y="44" font-size="12">air compression + Wells turbine</text>
  </g>
  <g transform="translate(28 76)">
    <rect x="0" y="30" width="92" height="18" rx="4" fill="#263238"/>
    <circle cx="22" cy="52" r="12" fill="#111"/>
    <circle cx="70" cy="52" r="12" fill="#111"/>
    <rect x="22" y="8" width="50" height="24" rx="4" fill="#12a1c9"/>
    <path d="M72 32 L94 32 L84 12 L72 8 Z" fill="#12a1c9"/>
  </g>
  <g transform="translate(120 116)">
    <path d="M0 26 Q45 -12 90 26 Z" fill="#f3d64d" stroke="#b9961e" stroke-width="2"/>
    <text x="20" y="48" font-family="Arial" font-size="12" fill="#5b6b7b">air chamber</text>
  </g>
  <path d="M166 108 C180 88, 200 88, 214 108" fill="none" stroke="#0b6e8f" stroke-width="3" marker-end="url(#arrow)"/>
  <g transform="translate(228 76)" stroke="#1f2933" stroke-width="2" fill="none">
    <circle cx="34" cy="34" r="30" fill="#fff"/>
    <path d="M34 34 L34 8 M34 34 L56 48 M34 34 L12 48"/>
    <circle cx="34" cy="34" r="5" fill="#d24b4b"/>
    <text x="-4" y="82" font-family="Arial" font-size="12" fill="#5b6b7b" stroke="none">generator</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#0b6e8f"/>
    </marker>
  </defs>
</svg>
