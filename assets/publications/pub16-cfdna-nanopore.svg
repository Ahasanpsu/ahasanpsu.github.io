<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 190" role="img" aria-labelledby="title desc">
  <title id="title">Solid-state nanopore sizing for cfDNA quality control</title>
  <desc id="desc">Graphical schematic of cfDNA fragments passing through a nanopore with signal traces used for sizing.</desc>
  <rect width="320" height="190" fill="#f7fbfd"/>
  <g font-family="Arial, Helvetica, sans-serif" fill="#12233b">
    <text x="18" y="24" font-size="17" font-weight="700">cfDNA sample QC</text>
    <text x="18" y="44" font-size="12">solid-state nanopore sizing</text>
  </g>
  <g stroke="#0b6e8f" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M30 82 C48 62, 68 102, 88 82 S128 62, 148 82"/>
    <path d="M30 116 C46 98, 64 132, 82 116 S116 98, 134 116"/>
    <path d="M34 146 C48 136, 62 156, 78 146 S106 136, 122 146"/>
  </g>
  <g transform="translate(162 58)">
    <rect x="0" y="0" width="42" height="92" rx="6" fill="#1f2933"/>
    <rect x="15" y="0" width="12" height="92" fill="#fff"/>
    <circle cx="21" cy="46" r="8" fill="#12a1c9"/>
    <path d="M-18 46 H12 M30 46 H58" stroke="#444" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <g transform="translate(235 55)" fill="none" stroke-width="2">
    <rect x="0" y="0" width="64" height="72" rx="5" fill="#fff" stroke="#d6e2ea"/>
    <path d="M6 36 H16 L18 20 L22 58 L26 28 L30 44 H58" stroke="#d24b4b"/>
    <path d="M6 52 H58" stroke="#5b6b7b" opacity=".45"/>
    <text x="8" y="88" font-family="Arial" font-size="12" fill="#12233b">size readout</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#444"/>
    </marker>
  </defs>
</svg>
